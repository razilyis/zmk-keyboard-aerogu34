---
include:
  # Central (right) — Prospector enabled (default)
  - board: seeeduino_xiao_ble
    shield: aerogu34_right rgbled_adapter
    snippet: studio-rpc-usb-uart
    artifact-name: aerogu34_right_prospector

  # Central (right) — Prospector disabled
  - board: seeeduino_xiao_ble
    shield: aerogu34_right rgbled_adapter
    snippet: studio-rpc-usb-uart
    artifact-name: aerogu34_right
    cmake-args: -DCONFIG_ZMK_STATUS_ADVERTISEMENT=n

  # Peripheral (left) — single variant
  - board: seeeduino_xiao_ble
    shield: aerogu34_left rgbled_adapter
    artifact-name: aerogu34_left

  # BLE pairing reset
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: settings_reset
