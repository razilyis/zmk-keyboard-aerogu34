# Zephyr 4 xiao_ble defaults bind the UART console to a second USB CDC ACM
# endpoint, which collides with the studio-rpc-usb-uart endpoint that DYA
# Studio expects to open. Disable the board-default serial backend so only
# the Studio RPC CDC ACM is exposed.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n

# PAW3222 trackball
CONFIG_PAW3222=y
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# BLE
# 6 slots = 5 host profiles (BT_SEL 0-4) + 1 split peripheral.
# Each ZMK BLE profile consumes one paired slot; ZMK derives the visible
# profile count as BT_MAX_PAIRED - ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS.
CONFIG_BT_MAX_CONN=6
CONFIG_BT_MAX_PAIRED=6
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_DIS=y

# Battery
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# RGB LED widget
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=40
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20

# ========================================
# DYA Studio modules (Central side)
# ========================================
# BLE management
CONFIG_ZMK_BLE_MANAGEMENT=y
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=y

# Battery history
CONFIG_ZMK_BATTERY_HISTORY=y
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=y
# Record battery history during USB-connected sessions
# (otherwise DYA Studio sessions over USB record nothing)
CONFIG_ZMK_BATTERY_SKIP_IF_USB_POWERED=n

# Settings RPC (idle/sleep)
CONFIG_ZMK_SETTINGS_RPC=y
CONFIG_ZMK_SETTINGS_RPC_STUDIO=y

# Split event relay (central <-> peripheral)
CONFIG_ZMK_SPLIT_RELAY_EVENT=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=2048

# Runtime input processor (trackball settings via DYA Studio)
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=y
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=y

# Setting persistence
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=1000

# ========================================
# Optimization and Stability configs
# ========================================
# Increase ZMK Studio RPC thread stack and buffer sizes to prevent overflows during BLE transfers
CONFIG_ZMK_STUDIO_RPC_THREAD_STACK_SIZE=4096
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=256
CONFIG_ZMK_STUDIO_RPC_TX_BUF_SIZE=256

# Increase input thread stack size to prevent stack overflows during trackball processing
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# Increase Bluetooth transmit power for stable wireless connection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ========================================
# Prospector
# ========================================
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="Aerogu34"
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_STATUS_ADV_ACTIVE_INTERVAL_MS=100
CONFIG_ZMK_STATUS_ADV_IDLE_INTERVAL_MS=10000
CONFIG_ZMK_STATUS_ADV_ACTIVITY_TIMEOUT_MS=2000
CONFIG_ZMK_STATUS_ADV_WPM_WINDOW_SECONDS=30
