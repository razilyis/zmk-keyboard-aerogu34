manifest:
  defaults:
    revision: main
  remotes:
    - name: cormoran
      url-base: https://github.com/cormoran
    - name: sekigon-gonnoc
      url-base: https://github.com/sekigon-gonnoc
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: prospector
      url-base: https://github.com/t-ogura
  projects:
    # ZMK: cormoran fork with DYA Studio RPC subsystem
    - name: zmk
      remote: cormoran
      revision: v0.3-branch+dya
      import: app/west.yml
    # Trackball driver
    - name: zmk-driver-paw3222
      remote: sekigon-gonnoc
    # RGB LED widget
    # Pin to commit before "Remove v0.3 compatibility shims" (5b5a198);
    # later commits drop seeeduino_xiao_ble.overlay (and v0.3 compat shims).
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: a3510c9de46de8b42c803286f4978466c6ea3916
    # DYA Studio modules
    # Pinned to the last commit before each module's "Migrate to zmk v4" PR
    # (cormoran's modules are migrating their main branches to Zephyr 4.x /
    # ZMK main, but we're on ZMK v0.3-branch+dya / Zephyr 3.5).
    - name: zmk-module-ble-management
      remote: cormoran
      revision: 851661c
    - name: zmk-module-battery-history
      remote: cormoran
      revision: 307755d
    - name: zmk-module-settings-rpc
      remote: cormoran
      revision: ad1c995
    - name: zmk-module-runtime-input-processor
      remote: cormoran
      revision: dbf92f7
    # Deadzone input processor
    - name: zmk-input-processor-deadzone
      remote: prospector
    # Prospector
    - name: prospector-zmk-module
      remote: prospector
      revision: main
      path: modules/prospector-zmk-module
  self:
    path: config
